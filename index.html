<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HWM 102 - Hydrology CBT Exam</title>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #4a7bb7 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e0e7ff;
    }

    .container {
      background: rgba(255,255,255,0.98);
      color: #1e3c72;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 30px;
      width: 95%;
      max-width: 800px;
      text-align: center;
      position: relative;
      min-height: 650px;
    }

    h1 { color: #1e3c72; font-size: 2.2rem; margin-bottom: 8px; }
    .subtitle { color: #2a5298; font-size: 1.1rem; margin-bottom: 15px; }

    .progress-bar {
      height: 8px;
      background: #e0e7ff;
      border-radius: 4px;
      overflow: hidden;
      margin: 15px 0;
    }
    .progress-fill { height: 100%; background: #4a7bb7; width: 0%; transition: width 0.4s; }

    .footer {
      position: absolute;
      bottom: 15px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.9rem;
      color: #5f7a8c;
    }
    .footer strong { color: #1e3c72; }

    #start-screen input {
      width: 100%;
      max-width: 480px;
      padding: 16px;
      font-size: 1.2rem;
      border: 2px solid #4a7bb7;
      border-radius: 12px;
      margin: 20px 0;
    }

    .btn {
      background: #1e3c72;
      color: white;
      border: none;
      padding: 14px 40px;
      font-size: 1.2rem;
      border-radius: 50px;
      cursor: pointer;
      margin: 10px;
    }
    .btn:hover { background: #142850; transform: translateY(-2px); }

    .timer {
      font-size: 2.5rem;
      font-weight: bold;
      padding: 10px 30px;
      border-radius: 16px;
      display: inline-block;
      margin: 10px 0;
      background: #fff5f5;
      color: #c0392b;
    }
    .timer.yellow { background: #fff9c4; color: #f39c12; }
    .timer.red { background: #ffebee; color: #c0392b; animation: blink 1s infinite alternate; }
    @keyframes blink { from { opacity: 1; } to { opacity: 0.7; } }

    .question-num { font-size: 1.3rem; font-weight: 600; color: #1e3c72; margin: 10px 0; }
    .question { font-size: 1.3rem; line-height: 1.5; margin: 20px 0; color: #1e3c72; }

    .options { display: flex; flex-direction: column; gap: 12px; margin: 25px 0; }
    .option {
      background: #f0f5ff;
      border: 2px solid #c2d9ff;
      padding: 16px 20px;
      border-radius: 12px;
      text-align: left;
      cursor: pointer;
      font-size: 1.1rem;
      transition: all 0.25s;
    }
    .option:hover { background: #e0edff; border-color: #4a7bb7; }
    .option.selected { background: #1e3c72; color: white; border-color: #142850; }

    .nav-buttons { display: flex; justify-content: space-between; margin: 20px 0; }

    #result { display: none; }
    .score { font-size: 3.5rem; font-weight: 700; margin: 20px 0; }
    .good { color: #27ae60; }
    .average { color: #f39c12; }
    .poor { color: #e74c3c; }

    #corrections { display: none; margin-top: 30px; text-align: left; max-height: 550px; overflow-y: auto; padding: 20px; background: #f8fbff; border-radius: 16px; }
    .corr-question { margin: 20px 0; padding-bottom: 15px; border-bottom: 1px solid #ddd; }
    .corr-option.correct { background: #d5f5e3; border-color: #27ae60; font-weight: bold; }
    .corr-option.wrong { background: #fadbd8; border-color: #e74c3c; font-weight: bold; }
    .corr-option.unanswered { opacity: 0.6; border-style: dashed; }
  </style>
</head>
<body>

<div class="container">

  <div id="start-screen">
    <h1>HWM 102 CBT EXAM</h1>
    <p class="subtitle">Hydrology and Water Resources Management</p>
    <p style="font-size:1.2rem; margin:15px 0;">35 Questions • 15 Minutes</p>
    <input type="text" id="candidateName" placeholder="Enter your Full Name" required autofocus />
    <button class="btn" id="startBtn">Start Exam</button>
    <div class="footer">Built by <strong>VICTOR ARTISTIC DESIGN</strong></div>
  </div>

  <div id="quiz-screen" style="display:none;">
    <div class="timer" id="timer">15:00</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="question-num" id="qNum"></div>
    <div class="question" id="questionText"></div>
    <div class="options" id="options"></div>
    <div class="nav-buttons">
      <button class="btn" id="prevBtn">← Previous</button>
      <button class="btn" id="nextBtn">Next →</button>
    </div>
    <div class="footer">Built by <strong>VICTOR ARTISTIC DESIGN</strong></div>
  </div>

  <div id="result">
    <h1>Exam Completed!</h1>
    <p style="font-size:1.5rem; margin:20px 0;">Candidate: <strong id="resultName"></strong></p>
    <div class="score" id="scoreText"></div>
    <p id="message" style="font-size:1.6rem; margin:25px 0;"></p>
    <p id="quote"></p>
    <p style="font-size:1.3rem;">Time used: <span id="timeUsed"></span></p>
    <div class="result-actions">
      <button class="btn" id="viewCorrBtn">View Corrections</button>
      <button class="btn" onclick="window.print()">Print Results</button>
      <button class="btn" id="copyBtn">Copy Results to Clipboard</button>
    </div>
    <div id="corrections"></div>
    <div class="footer">Built by <strong>VICTOR ARTISTIC DESIGN</strong></div>
  </div>

</div>

<script>
// 35 hardest Hydrology questions
const questions = [
  {q: "Hydrology is the science that deals with the ______ of water on earth.", opts: ["A. Transportation", "B. Distribution and circulation", "C. Heating", "D. Storage"], correct: 1},
  {q: "Hydrology is concerned with the transportation of water through:", opts: ["A. Only the air and ground surface", "B. Solely the strata of the earth", "C. The air alone", "D. The air, over the ground surface, and through the strata of the earth"], correct: 3},
  {q: "The domain of hydrology embraces the full life history of ______ on earth.", opts: ["A. Soil", "B. Water", "C. Plants", "D. Minerals"], correct: 1},
  {q: "Hydrology is an ______ science.", opts: ["A. Independent", "B. Interdisciplinary", "C. Political", "D. Agricultural"], correct: 1},
  {q: "Hydrology borrows knowledge from which of the following?", opts: ["A. Physics", "B. Chemistry", "C. Biology", "D. All of the above"], correct: 3},
  {q: "Hydrology cuts across the ______.", opts: ["A. Atmosphere", "B. Hydrosphere", "C. Lithosphere", "D. All of the above"], correct: 3},
  {q: "Which of the following best describes the Hydrological cycle?", opts: ["A. A process driven only by gravity", "B. An intensifying / solar driving process of continuous water circulation from Evaporation, Condensation, Precipitation, Run-off and infiltration", "C. Only the movement of water below the ground", "D. A static process that stops during climate change"], correct: 1},
  {q: "The Hydrological cycle recycles:", opts: ["A. Only fresh water", "B. Minerals, nutrients, pathogens, and elements along with the water", "C. Only heat energy from the sun", "D. Only salts in the ocean"], correct: 1},
  {q: "How many processes are listed as involved in the Hydrological cycle?", opts: ["A. 5", "B. 9", "C. 11", "D. 7"], correct: 2},
  {q: "For evaporation to take place, energy is required and can come from:", opts: ["A. Only the sun", "B. Any source e.g. sun, atmosphere, earth, or object such as humans", "C. Only human exercise", "D. Only underground sources"], correct: 1},
  {q: "Condensation is the opposite of evaporation because:", opts: ["A. It requires energy input", "B. When condensation occurs, excess energy in the form of heat is released", "C. It only happens in plants", "D. It does not involve any temperature difference"], correct: 1},
  {q: "Without the cooling effects of the Hydrological cycle, the temperature on earth will rise drastically to:", opts: ["A. 0°C", "B. 100°C", "C. 32°F", "D. 67°C and 153°F"], correct: 3},
  {q: "Evaporation and infiltration help in the purification of water because:", opts: ["A. They add pollutants", "B. They only increase salinity", "C. They do not affect water quality", "D. When evaporation takes place, dust or sediment are left behind, and infiltration allows soil to naturally filter contaminants"], correct: 3},
  {q: "Intensification of the Hydrological cycle means:", opts: ["A. Decrease in moisture", "B. No change", "C. Only quality issues", "D. A normal atmosphere holds more moisture leading to a more intense faster cycle"], correct: 3},
  {q: "Interception is defined as:", opts: ["A. The part of rainfall that is intercepted by the earth surface which eventually evaporates", "B. Only the water that reaches the stream channel directly", "C. The downward flow of water through the zone of aeration", "D. The maximum rate at which rain water can be absorbed by soil"], correct: 0},
  {q: "Through rainfall is:", opts: ["A. The part of precipitation that reaches the ground directly through spaces in it and is a drip from leaves and stems", "B. The part of precipitation that has canopies and runs down the stems", "C. The origin of water that joins the stream channel after days or weeks", "D. The maximum rate at which rain water can be absorbed by soil"], correct: 0},
  {q: "How many factors control interception loss according to the notes?", opts: ["A. One", "B. Two (Precipitation and Vegetative cover)", "C. Three", "D. Five"], correct: 1},
  {q: "Infiltration capacity is defined as:", opts: ["A. The unit of rain water that passes into the ground surface in unit time", "B. The part of precipitation that drips from leaves", "C. The water that reaches the stream after percolating", "D. A maximum rate at which rain water can be absorbed by a soil in a given condition"], correct: 3},
  {q: "Precipitation is considered a meteorological concept when:", opts: ["A. It has reached the ground", "B. It has not reached the ground", "C. It is only in liquid form", "D. It is already on the ground"], correct: 1},
  {q: "When precipitation reaches the ground, it becomes:", opts: ["A. A meteorological concept only", "B. A Hydrological concept", "C. Insignificant for water cycle", "D. Only convective precipitation"], correct: 1},
  {q: "Accurate Hydrological data is essential for:", opts: ["A. Only agricultural planning", "B. Water resources management, flood reduction and environmental monitoring", "C. Only space research", "D. Only political decision-making"], correct: 1},
  {q: "One of the challenges in Hydrological data collection is:", opts: ["A. Excessive funding", "B. Technology limitation and adapting to climate change", "C. Too much political will", "D. Surplus of data"], correct: 1},
  {q: "Gender-disaggregated data is important because it:", opts: ["A. Reduces paperwork", "B. Helps understand differences in access and responsibility for water between sexes", "C. Is only used for statistics courses", "D. Replaces community consultations"], correct: 1},
  {q: "Which stage on the Gender Equality Spectrum actively changes unequal gender norms?", opts: ["A. Gender-unequal", "B. Gender-blind", "C. Gender-sensitive", "D. Gender-transformative"], correct: 3},
  {q: "One of the Dublin Principles states that:", opts: ["A. Water should be free for all commercial uses", "B. Water development should be participatory and involve users, planners and policy-makers", "C. Water is infinite and needs no management", "D. Water governance should exclude communities"], correct: 1},
  {q: "A common challenge to implementing gender policies is:", opts: ["A. Excessive funding", "B. Deep-rooted sociocultural norms that limit women’s participation", "C. Too much political will", "D. Surplus of sex-disaggregated data"], correct: 1},
  {q: "The study of oceans is called ______.", opts: ["A. Limnology", "B. Oceanography", "C. Cryology", "D. Agronomy"], correct: 1},
  {q: "The study of lakes is known as ______.", opts: ["A. Limnology", "B. Meteorology", "C. Potamology", "D. Climatology"], correct: 0},
  {q: "The movement of water through the air is studied in ______.", opts: ["A. Meteorology", "B. Sociology", "C. Philosophy", "D. Politics"], correct: 0},
  {q: "Hydrology helps in the control of ______.", opts: ["A. Flood", "B. Wind", "C. Fire", "D. Heat"], correct: 0},
  {q: "Water plays an important role in ______ preservation.", opts: ["A. Ecosystem", "B. Buildings", "C. Roads", "D. Vehicles"], correct: 0},
  {q: "Water is used in industry for ______.", opts: ["A. Cooking engines", "B. Food preservation", "C. Sanitation", "D. All of the above"], correct: 3},
  {q: "Hydrology helps in ______ control in rivers.", opts: ["A. Sand", "B. Erosion and sediment", "C. Rain", "D. Air"], correct: 1},
  {q: "The most remarkable substance on earth according to hydrology is ______.", opts: ["A. Air", "B. Soil", "C. Water", "D. Fire"], correct: 2}
];

let userAnswers = new Array(questions.length).fill(-1);
let current = 0;
let timeLeft = 15 * 60;
let timerId;
let candidate = "";

const startScreen = document.getElementById("start-screen");
const quizScreen = document.getElementById("quiz-screen");
const resultScreen = document.getElementById("result");
const correctionsDiv = document.getElementById("corrections");
const viewCorrBtn = document.getElementById("viewCorrBtn");
const timerEl = document.getElementById("timer");
const progressFill = document.getElementById("progressFill");
const qNum = document.getElementById("qNum");
const questionText = document.getElementById("questionText");
const optionsDiv = document.getElementById("options");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");

const quotes = [
  "The only way to learn hydrology is to understand the water cycle.",
  "Water is the driving force of all nature. – Leonardo da Vinci",
  "Hydrology is the science of water in all its forms.",
  "In the end, all water returns to the sea.",
  "The Hydrological cycle is the heartbeat of the Earth."
];

document.getElementById("startBtn").onclick = () => {
  candidate = document.getElementById("candidateName").value.trim();
  if (!candidate) {
    alert("Please enter your full name to start the exam!");
    return;
  }

  questions.sort(() => 0.5 - Math.random());
  userAnswers = new Array(questions.length).fill(-1);
  current = 0;

  startScreen.style.display = "none";
  quizScreen.style.display = "block";
  startTimer();
  loadQuestion();
};

function startTimer() {
  timerId = setInterval(() => {
    timeLeft--;
    const min = Math.floor(timeLeft / 60);
    const sec = timeLeft % 60;
    timerEl.textContent = `\( {min}: \){sec < 10 ? "0" : ""}${sec}`;

    timerEl.classList.remove("yellow", "red");
    if (timeLeft <= 120) timerEl.classList.add("red");
    else if (timeLeft <= 300) timerEl.classList.add("yellow");

    if (timeLeft <= 0) {
      clearInterval(timerId);
      submitExam();
    }
  }, 1000);
}

function loadQuestion() {
  const q = questions[current];
  qNum.textContent = `Question ${current + 1} of 35`;
  questionText.innerHTML = q.q;
  optionsDiv.innerHTML = "";

  q.opts.forEach((opt, i) => {
    const div = document.createElement("div");
    div.className = "option";
    div.innerHTML = opt;
    if (userAnswers[current] === i) div.classList.add("selected");
    div.onclick = () => {
      userAnswers[current] = i;
      optionsDiv.querySelectorAll(".option").forEach(el => el.classList.remove("selected"));
      div.classList.add("selected");
    };
    optionsDiv.appendChild(div);
  });

  prevBtn.disabled = current === 0;
  nextBtn.textContent = current === 34 ? "Submit Exam" : "Next →";

  const progress = ((current + 1) / 35) * 100;
  progressFill.style.width = progress + "%";
}

prevBtn.onclick = () => { if (current > 0) { current--; loadQuestion(); } };

nextBtn.onclick = () => {
  if (current < 34) {
    current++;
    loadQuestion();
  } else {
    const unanswered = userAnswers.filter(a => a === -1).length;
    if (unanswered > 0 && !confirm(`You have ${unanswered} unanswered question(s). Submit anyway?`)) return;
    submitExam();
  }
};

function submitExam() {
  clearInterval(timerId);
  quizScreen.style.display = "none";
  resultScreen.style.display = "block";

  let score = 0;
  userAnswers.forEach((ans, i) => { if (ans === questions[i].correct) score++; });

  const percent = Math.round((score / 35) * 100);
  const msg = percent >= 80 ? "Outstanding Performance! 🌟" :
              percent >= 50 ? "Good Job! Keep Practicing 👍" :
              "More Effort Needed 💪 You Can Do Better!";

  document.getElementById("resultName").textContent = candidate;
  document.getElementById("scoreText").textContent = `\( {score} / 35 ( \){percent}%)`;
  document.getElementById("scoreText").className = "score " + (percent >= 80 ? "good" : percent >= 50 ? "average" : "poor");
  document.getElementById("message").textContent = msg;

  const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
  document.getElementById("quote").textContent = `"${randomQuote}"`;

  if (percent >= 80) {
    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
  }

  const usedMin = Math.floor((900 - timeLeft) / 60);
  const usedSec = (900 - timeLeft) % 60;
  document.getElementById("timeUsed").textContent = `${usedMin} min ${usedSec} sec`;

  document.getElementById("copyBtn").onclick = () => {
    const text = `HWM 102 HYDROLOGY CBT RESULT\n\nCandidate: ${candidate}\nScore: \( {score}/35 ( \){percent}%)\nTime Used: ${usedMin} min \( {usedSec} sec\n\n \){msg}\n\n"${randomQuote}"\n\nBuilt by VICTOR ARTISTIC DESIGN`;
    navigator.clipboard.writeText(text).then(() => alert("Results copied to clipboard!"));
  };

  viewCorrBtn.onclick = () => {
    if (correctionsDiv.style.display === "block") {
      correctionsDiv.style.display = "none";
      viewCorrBtn.textContent = "View Corrections";
    } else {
      correctionsDiv.style.display = "block";
      viewCorrBtn.textContent = "Hide Corrections";
      showCorrections();
    }
  };
}

function showCorrections() {
  correctionsDiv.innerHTML = "<h2 style='text-align:center; color:#1e3c72; margin-bottom:20px;'>Detailed Corrections</h2>";
  questions.forEach((q, i) => {
    const div = document.createElement("div");
    div.className = "corr-question";
    div.innerHTML = `<strong>Question ${i + 1}:</strong> ${q.q}`;
    
    const optsDiv = document.createElement("div");
    optsDiv.className = "options";
    q.opts.forEach((opt, j) => {
      const optDiv = document.createElement("div");
      optDiv.className = "option corr-option";
      optDiv.innerHTML = opt;
      if (j === q.correct) optDiv.classList.add("correct");
      if (userAnswers[i] === j && j !== q.correct) optDiv.classList.add("wrong");
      if (userAnswers[i] === -1) optDiv.classList.add("unanswered");
      optsDiv.appendChild(optDiv);
    });

    const status = userAnswers[i] === q.correct ? "<span style='color:#27ae60;font-weight:bold;'>Correct! ✅</span>" :
                   userAnswers[i] === -1 ? "<span style='color:#7f8c8d;'>Unanswered</span>" :
                   `<span style='color:#e74c3c;font-weight:bold;'>Incorrect ❌</span> (Correct: ${q.opts[q.correct]})`;
    div.innerHTML += `<p style='margin-top:12px;'>${status}</p>`;
    div.appendChild(optsDiv);
    correctionsDiv.appendChild(div);
  });
}
</script>
</body>
      </html>
